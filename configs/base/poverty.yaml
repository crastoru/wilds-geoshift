training:
  epochs: 200
  seed: 2023

checkpoint:
  save_top_k: 1
  monitor: 'val_loss'
  mode: 'min'
  filename: "{epoch:02d}-{val_r_all:.4f}-{val_r_wg:.4f}-{val_loss:.4f}"

dataset: 
  class_reference: utils.data_utils.PovertyMapDataset
  params:
    fold: 'D'

data_loader:
  batch_size: 64
  uniform_over_groups: false

grouper:
  class_reference: wilds.common.grouper.CombinatorialGrouper
  params:
    groupby_fields: ["urban"]

model:
  class_reference: models.lightning.poverty.PovertyLightning
  params:
    loc_encoder: "none"
    multihead: false
    d3g_beta: 0.0
    d3g_loss_coeff: 0.0
    coral_weight: 0
    irm_weight: 0
    lr_init: 0.001
    weight_decay: 0.0
    dropout: 0
    use_film: false
    film_penalty: 0
    n_grad_accumulation: 1
    lr_scheduler:
      class_reference: torch.optim.lr_scheduler.StepLR
      params:
        step_size: 1
        gamma: 0.96
